<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    padding: 10px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 4px;
  }
  .score { color: #e94560; font-size: 22px; font-weight: bold; }
  .timer { color: #c0a060; font-size: 18px; font-weight: bold; }
  .best  { color: #888; font-size: 16px; }
  .game-area {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
  }
  canvas {
    border: 2px solid #0f3460;
    border-radius: 4px;
    background: #16213e;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    border-radius: 4px;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    cursor: pointer;
    gap: 6px;
    overflow-y: auto;
    padding: 16px;
  }
  .overlay .title { font-size: 24px; font-weight: bold; }
  .overlay .score-text { font-size: 18px; color: #e94560; }
  .overlay .btn {
    font-size: 16px;
    padding: 8px 28px;
    border: 2px solid #e94560;
    border-radius: 20px;
    color: #e94560;
    background: transparent;
    cursor: pointer;
    font-weight: bold;
    margin-top: 4px;
  }
  .overlay .btn:hover { background: rgba(233,69,96,0.15); }
  .overlay .lb-title {
    font-size: 14px;
    color: #c0a060;
    margin-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 10px;
  }
  .overlay .lb-list {
    font-size: 13px;
    color: #aaa;
    width: 100%;
    max-width: 260px;
    text-align: center;
  }
  .overlay .lb-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .overlay .lb-row.highlight { color: #e94560; }
  .hidden { display: none; }

  .joystick-base {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
    border: 2px solid rgba(255,255,255,0.12);
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .joystick-thumb {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(233, 69, 96, 0.45);
    border: 2px solid rgba(233, 69, 96, 0.3);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .controls {
    color: #555;
    font-size: 13px;
    text-align: center;
  }
  .controls span { color: #e94560; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="score">分数: <span id="score">0</span></div>
    <div class="timer">⏱ <span id="timer">00:00</span></div>
    <div class="best">最高: <span id="best">0</span></div>
  </div>
  <div class="game-area">
    <canvas id="canvas"></canvas>
    <div id="overlay" class="overlay hidden">
      <div class="title">游戏结束</div>
      <div class="score-text" id="finalScore"></div>
      <div class="btn" id="restartBtn">点击重新开始</div>
      <div class="lb-title">🏆 排行榜</div>
      <div class="lb-list" id="lbList"></div>
    </div>
  </div>
  <div class="joystick-base" id="joystick">
    <div class="joystick-thumb" id="thumb"></div>
  </div>
  <div class="controls">
    键盘 <span>WASD/方向键</span> &nbsp;|&nbsp; 画面划动 &nbsp;|&nbsp; 摇杆控制
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const timerEl = document.getElementById('timer');
const overlay = document.getElementById('overlay');
const finalScore = document.getElementById('finalScore');
const lbList = document.getElementById('lbList');
const restartBtn = document.getElementById('restartBtn');
const joystick = document.getElementById('joystick');
const thumb = document.getElementById('thumb');

const GRID = 20;
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;

let snake, food, bonusFood, bonusTimer, dir, nextDir, score, best, gameLoop, running, paused;
let elapsed, timerInterval, startTime;
let particles = [];
let speedLevel = 0;
let foodsEaten = 0;
// 用 <audio> 播放，自动跟随设备静音开关
function makeWav(freq, type, duration, vol) {
  const sampleRate = 8000;
  const samples = Math.floor(sampleRate * duration);
  const buffer = new ArrayBuffer(44 + samples);
  const view = new DataView(buffer);

  function w(s, o, v) { view.setUint8(s + o, v, true); }
  function w16(s, o, v) { view.setInt16(s + o, v, true); }
  function w32(s, o, v) { view.setUint32(s + o, v, true); }

  // RIFF header
  w(0, 0, 0x52); w(0, 1, 0x49); w(0, 2, 0x46); w(0, 3, 0x46); // "RIFF"
  w32(0, 4, 36 + samples);                                       // chunk size
  w(0, 8, 0x57); w(0, 9, 0x41); w(0, 10, 0x56); w(0, 11, 0x45); // "WAVE"

  // fmt chunk
  w(0, 12, 0x66); w(0, 13, 0x6d); w(0, 14, 0x74); w(0, 15, 0x20); // "fmt "
  w32(0, 16, 16);       // chunk size
  w16(0, 20, 1);        // PCM
  w16(0, 22, 1);        // mono
  w32(0, 24, sampleRate);
  w32(0, 28, sampleRate);
  w16(0, 32, 1);        // block align
  w16(0, 34, 8);        // bits per sample

  // data chunk
  w(0, 36, 0x64); w(0, 37, 0x61); w(0, 38, 0x74); w(0, 39, 0x61); // "data"
  w32(0, 40, samples);

  for (let i = 0; i < samples; i++) {
    const t = i / sampleRate;
    let v;
    if (type === 'sine') v = Math.sin(2 * Math.PI * freq * t);
    else v = Math.sin(2 * Math.PI * freq * t) > 0 ? 1 : -1;

    // 淡入淡出
    const env = Math.min(1, i / 100, (samples - i) / 100);
    v *= env * vol * 127;

    view.setUint8(44 + i, Math.round(v + 128));
  }

  return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
}

const sfxEat = makeWav(600, 'sine', 0.1, 0.25);
const sfxBonus1 = makeWav(880, 'square', 0.15, 0.15);
const sfxBonus2 = makeWav(1100, 'square', 0.12, 0.12);

function playSfx(url) {
  const a = new Audio(url);
  a.play().catch(() => {}); // 静音开关开启时 play 会 reject，忽略即可
}

function eatSound(bonus) {
  if (bonus) {
    playSfx(sfxBonus1);
    setTimeout(() => playSfx(sfxBonus2), 80);
  } else {
    playSfx(sfxEat);
  }
}

try {
  const saved = localStorage.getItem('snakeBest');
  best = saved ? parseInt(saved, 10) : 0;
  if (isNaN(best)) best = 0;
} catch(e) { best = 0; }
bestEl.textContent = best;

function getInterval() {
  return Math.max(40, 100 - Math.floor(score / 50) * 5);
}

function init() {
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX, y: midY },
    { x: midX - 1, y: midY },
    { x: midX - 2, y: midY },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  speedLevel = 0;
  foodsEaten = 0;
  scoreEl.textContent = score;
  running = true;
  paused = false;
  particles = [];
  bonusFood = null;
  clearTimeout(bonusTimer);
  overlay.classList.add('hidden');
  elapsed = 0;
  startTime = Date.now();
  timerEl.textContent = '00:00';
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  spawnFood();
}

function updateTimer() {
  if (!running || paused) return;
  elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function randomFreeCell() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  if (bonusFood) occupied.add(`${bonusFood.x},${bonusFood.y}`);
  const free = [];
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      if (!occupied.has(`${x},${y}`)) free.push({ x, y });
  return free.length ? free[Math.floor(Math.random() * free.length)] : null;
}

function spawnFood() {
  const cell = randomFreeCell();
  if (cell) food = cell;
}

function spawnBonus() {
  bonusFood = randomFreeCell();
  if (!bonusFood) return;
  bonusTimer = setTimeout(() => {
    bonusFood = null;
  }, 8000);
}

function trySpawnBonus() {
  if (bonusFood) return;
  if (foodsEaten > 0 && foodsEaten % 3 === 0 && Math.random() < 0.7) {
    spawnBonus();
  }
}

function burstParticles(x, y, color) {
  const cx = x * GRID + GRID / 2;
  const cy = y * GRID + GRID / 2;
  const count = color ? 18 : 12;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.04,
      color: color || '#e94560',
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color.replace(')', `, ${p.life})`).replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5 * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function eatFood(f, bonus) {
  const pts = bonus ? 30 : 10;
  score += pts;
  scoreEl.textContent = score;
  foodsEaten++;
  eatSound(bonus);
  burstParticles(f.x, f.y, bonus ? '#ffd700' : '#e94560');

  if (bonus) {
    bonusFood = null;
    clearTimeout(bonusTimer);
  } else {
    spawnFood();
    trySpawnBonus();
  }

  const newLevel = Math.floor(score / 50);
  if (newLevel !== speedLevel) {
    speedLevel = newLevel;
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, getInterval());
  }
}

function update() {
  if (!running || paused) return;
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    eatFood(food, false);
    ate = true;
  }
  if (!ate && bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
    eatFood(bonusFood, true);
    ate = true;
  }

  if (!ate) snake.pop();
  updateParticles();
}

function drawFood(f, color) {
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(f.x * GRID + GRID / 2, f.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBonusFood() {
  if (!bonusFood) return;
  const cx = bonusFood.x * GRID + GRID / 2;
  const cy = bonusFood.y * GRID + GRID / 2;
  const r = GRID / 2 - 2;
  const pulse = 1 + Math.sin(Date.now() / 200) * 0.15;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);

  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  const spikes = 5;
  const outerR = r, innerR = r * 0.45;
  for (let i = 0; i < spikes * 2; i++) {
    const radius = i % 2 === 0 ? outerR : innerR;
    const angle = (Math.PI * 2 / (spikes * 2)) * i - Math.PI / 2;
    const px = Math.cos(angle) * radius;
    const py = Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // +30 文字
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = 'bold 8px "Segoe UI"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('+30', 0, 1);

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, ROWS * GRID); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(COLS * GRID, y * GRID); ctx.stroke(); }

  drawParticles();
  drawFood(food, '#e94560');
  drawBonusFood();

  snake.forEach((s, i) => {
    const alpha = 1 - i / (snake.length + 10) * 0.6;
    ctx.fillStyle = i === 0 ? '#0f0' : `rgba(0, 200, 100, ${alpha})`;
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });

  const now = new Date();
  const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '11px "Segoe UI"';
  ctx.textAlign = 'right';
  ctx.fillText(ds, canvas.width - 6, canvas.height - 6);

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
  }
}

function loadLB() {
  try {
    return JSON.parse(localStorage.getItem('snakeLB') || '[]');
  } catch(e) { return []; }
}

function saveLB(entry) {
  const lb = loadLB();
  lb.push(entry);
  lb.sort((a, b) => b.score - a.score);
  const top = lb.slice(0, 10);
  localStorage.setItem('snakeLB', JSON.stringify(top));
}

function renderLB(highlightId) {
  const lb = loadLB();
  if (!lb.length) { lbList.innerHTML = '<div style="color:#555;margin-top:6px;">暂无记录</div>'; return; }
  lbList.innerHTML = lb.map((e, i) => {
    const hl = e.id === highlightId ? ' highlight' : '';
    return `<div class="lb-row${hl}"><span>#${i + 1} ${e.date}</span><span>${e.score}分</span></div>`;
  }).join('');
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  clearInterval(timerInterval);
  clearTimeout(bonusTimer);
  bonusFood = null;

  if (score > best) {
    best = score;
    bestEl.textContent = best;
    try { localStorage.setItem('snakeBest', String(best)); } catch(e) {}
  }

  const now = new Date();
  const dateStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const entryId = Date.now();
  saveLB({ score, date: dateStr, id: entryId });

  finalScore.textContent = score + '分';
  renderLB(entryId);
  overlay.classList.remove('hidden');
}

restartBtn.addEventListener('click', e => {
  e.stopPropagation();
  restart();
});

overlay.addEventListener('click', e => {
  if (e.target === overlay) restart();
});

function restart() {
  init();
  startLoop();
}

function setDirection(d) {
  if (dir.x === -d.x && dir.y === -d.y) return;
  nextDir = d;
  if (!running) restart();
}

let swipeStartX, swipeStartY, swipeActive;

canvas.addEventListener('touchstart', e => {
  if (!running) { restart(); return; }
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeActive = true;
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!swipeActive) return;
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  swipeActive = false;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDirection(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
  } else {
    setDirection(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
  }
}, { passive: true });

canvas.addEventListener('touchend', () => {
  if (swipeActive) {
    swipeActive = false;
    if (!running) { restart(); return; }
    paused = !paused;
    if (paused) { clearInterval(timerInterval); }
    else { startTime = Date.now() - elapsed * 1000; timerInterval = setInterval(updateTimer, 1000); }
  }
});

canvas.addEventListener('click', () => {
  if (!running) { restart(); return; }
  paused = !paused;
  if (paused) { clearInterval(timerInterval); }
  else { startTime = Date.now() - elapsed * 1000; timerInterval = setInterval(updateTimer, 1000); }
});

const JOYSTICK_R = 55;
const DEAD = 14;
let joyActive = false;

function joyPos(e) {
  const touch = e.touches[0];
  const rect = joystick.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = touch.clientX - cx;
  let dy = touch.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = JOYSTICK_R - 22;
  if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
  thumb.style.left = `calc(50% + ${dx}px)`;
  thumb.style.top  = `calc(50% + ${dy}px)`;

  if (dist < DEAD) return;

  const angle = Math.atan2(dy, dx);
  let d;
  if      (angle > -Math.PI/4 && angle <= Math.PI/4)   d = { x: 1, y: 0 };
  else if (angle >  Math.PI/4 && angle <= 3*Math.PI/4) d = { x: 0, y: 1 };
  else if (angle > -3*Math.PI/4 && angle <= -Math.PI/4) d = { x: 0, y: -1 };
  else                                                   d = { x: -1, y: 0 };
  setDirection(d);
}

function joyStart(e) { e.preventDefault(); joyActive = true; joyPos(e); }
function joyMove(e)  { if (!joyActive) return; e.preventDefault(); joyPos(e); }
function joyEnd(e)   { e.preventDefault(); joyActive = false; thumb.style.left = '50%'; thumb.style.top = '50%'; }

joystick.addEventListener('touchstart', joyStart, { passive: false });
joystick.addEventListener('touchmove',  joyMove,  { passive: false });
joystick.addEventListener('touchend',   joyEnd);
joystick.addEventListener('touchcancel', joyEnd);

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
  };
  const k = map[e.key.toLowerCase()];
  if (k) { e.preventDefault(); setDirection(k); }
  if (e.key === ' ') {
    e.preventDefault();
    if (!running) { restart(); return; }
    paused = !paused;
    if (paused) { clearInterval(timerInterval); }
    else { startTime = Date.now() - elapsed * 1000; timerInterval = setInterval(updateTimer, 1000); }
  }
});

function tick() { update(); draw(); }

function startLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, getInterval());
}

init();
startLoop();

// iOS 音频解锁：首次交互时播一个静音，后续音效才能正常播放
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  const a = new Audio(sfxEat);
  a.volume = 0;
  a.play().catch(() => {});
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
  document.removeEventListener('keydown', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio);
document.addEventListener('click', unlockAudio);
document.addEventListener('keydown', unlockAudio);
</script>
</body>
</html>
