<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>贪吃蛇</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="贪吃蛇">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#22223a">
<link rel="manifest" href="manifest.json">
<style>
  :root { --bg:#22223a; --panel:#2c2c52; --border:#4a4a7a; --accent:#e94560; --gold:#ffd700; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); display:flex; justify-content:center; align-items:center;
    height:100vh; height:100dvh; font-family:-apple-system,'Segoe UI','PingFang SC',sans-serif;
    overflow:hidden; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none; user-select:none; overscroll-behavior:none;
  }
  .container { display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; max-width:480px; padding:12px; }
  .header { display:flex; justify-content:space-between; align-items:center; width:100%; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px 18px; }
  .stat { text-align:center; }
  .stat-label { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:1px; }
  .stat-value { font-size:22px; font-weight:700; }
  .stat-score .stat-value { color:var(--accent); }
  .stat-timer .stat-value { color:#c0a060; }
  .stat-best  .stat-value { color:#8ecae6; }
  .game-area { position:relative; width:100%; aspect-ratio:1; border-radius:12px; overflow:hidden; box-shadow:0 0 40px rgba(233,69,96,0.08),0 0 80px rgba(0,0,0,0.3); }
  canvas { width:100%; height:100%; display:block; touch-action:none; background:#282850; }
  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(10,10,30,0.85); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:#fff; gap:8px; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .overlay.show { opacity:1; pointer-events:auto; }
  .overlay-title { font-size:26px; font-weight:800; }
  .overlay-score { font-size:38px; font-weight:800; color:var(--accent); }
  .overlay-stats { font-size:13px; color:#aaa; display:flex; gap:16px; margin-bottom:4px; }
  .overlay-stats b { color:#ddd; }
  .btn { font-size:15px; padding:10px 32px; border:2px solid var(--accent); border-radius:24px; color:var(--accent); background:transparent; cursor:pointer; font-weight:700; letter-spacing:1px; transition:all .2s; }
  .btn:active { background:var(--accent); color:#fff; transform:scale(.96); }
  .lb-wrap { margin-top:10px; width:100%; max-width:260px; }
  .lb-title { font-size:12px; color:#c0a060; letter-spacing:2px; text-transform:uppercase; text-align:center; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:8px; }
  .lb-row { display:flex; justify-content:space-between; align-items:center; padding:5px 10px; border-radius:6px; font-size:13px; color:#888; }
  .lb-row.highlight { background:rgba(233,69,96,.12); color:var(--accent); }
  .lb-rank { width:26px; font-weight:700; }
  .lb-rank.gold { color:#ffd700; } .lb-rank.silver { color:#c0c0c0; } .lb-rank.bronze { color:#cd7f32; }
  .lb-date { flex:1; text-align:left; }
  .lb-score { font-weight:700; }
  .lb-empty { color:#555; font-size:13px; text-align:center; padding:10px; }
  .joystick-wrap { transition:opacity .4s,transform .4s; }
  .joystick-wrap.hidden-joy { opacity:0; transform:translateY(20px); pointer-events:none; }
  .joystick-base { width:110px; height:110px; border-radius:50%; background:radial-gradient(circle at center,rgba(255,255,255,.05),transparent 70%); border:2px solid rgba(255,255,255,.12); position:relative; touch-action:none; }
  .joystick-base::after { content:''; position:absolute; inset:4px; border-radius:50%; border:1px solid rgba(255,255,255,.06); }
  .joystick-thumb { width:42px; height:42px; border-radius:50%; background:radial-gradient(circle at 40% 35%,rgba(233,69,96,.5),rgba(233,69,96,.2)); border:2px solid rgba(233,69,96,.25); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; transition:width .15s,height .15s; }
  .level-badge { position:absolute; top:8px; right:8px; background:rgba(233,69,96,.15); color:var(--accent); font-size:11px; font-weight:700; padding:3px 8px; border-radius:10px; pointer-events:none; border:1px solid rgba(233,69,96,.25); }
  .hint { color:#777; font-size:12px; text-align:center; letter-spacing:.5px; }
  .hint kbd { color:var(--accent); background:rgba(233,69,96,.1); padding:1px 6px; border-radius:3px; font-size:11px; border:1px solid rgba(233,69,96,.15); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="stat stat-score"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
    <div class="stat stat-timer"><div class="stat-label">时间</div><div class="stat-value" id="timer">00:00</div></div>
    <div class="stat stat-best"><div class="stat-label">最高</div><div class="stat-value" id="best">0</div></div>
  </div>

  <div class="game-area" id="gameArea">
    <canvas id="canvas"></canvas>
    <div class="level-badge" id="levelBadge">Lv.1</div>
    <div class="overlay" id="overlay">
      <div class="overlay-title">游戏结束</div>
      <div class="overlay-score" id="finalScore">0</div>
      <div class="overlay-stats">用时 <b id="finalTime">00:00</b> · 长度 <b id="finalLen">3</b></div>
      <button class="btn">再来一局</button>
      <div class="lb-wrap"><div class="lb-title">&#127942; 排行榜</div><div id="lbList"></div></div>
    </div>
  </div>

  <div class="joystick-wrap" id="joyWrap">
    <div class="joystick-base" id="joystick"><div class="joystick-thumb" id="thumb"></div></div>
  </div>

  <div class="hint">键盘 <kbd>WASD</kbd> <kbd>&#8593;&#8595;&#8592;&#8594;</kbd> · 画面划动 · 摇杆 &nbsp;|&nbsp; <kbd>R</kbd> 重开</div>
</div>

<script>
(function(){
var $ = function(s) { return document.getElementById(s); };
var E = {
  canvas: $('canvas'), ctx: $('canvas').getContext('2d'),
  score: $('score'), best: $('best'), timer: $('timer'),
  overlay: $('overlay'), fScore: $('finalScore'), fTime: $('finalTime'), fLen: $('finalLen'),
  lb: $('lbList'), lvl: $('levelBadge'), joyW: $('joyWrap'),
  thumb: $('thumb'), joy: $('joystick'),
};

var G = 20, W = 25, H = 25;
E.canvas.width = W * G;
E.canvas.height = H * G;

var snake, food, bonus, bTimer, dir, next, score, best, loop, run, paused, lv, ateCount;
var elapsed, tick, startTime, pars = [];

// ---- 音效 ----
function synth(f, ty, d) {
  var sr = 8000, n = sr * d | 0;
  var buf = new ArrayBuffer(44 + n), v = new DataView(buf);
  var u8 = function(o, x) { v.setUint8(o, x, true); };
  var u32 = function(o, x) { v.setUint32(o, x, true); };
  var u16 = function(o, x) { v.setInt16(o, x, true); };
  var str = function(o, s) { for (var i = 0; i < s.length; i++) u8(o + i, s.charCodeAt(i)); };
  str(0, 'RIFF'); u32(4, 36 + n); str(8, 'WAVE');
  str(12, 'fmt '); u32(16, 16); u16(20, 1); u16(22, 1); u32(24, sr); u32(28, sr); u16(32, 1); u16(34, 8);
  str(36, 'data'); u32(40, n);
  for (var i = 0; i < n; i++) {
    var t = i / sr;
    var sm = ty === 's' ? Math.sin(2 * Math.PI * f * t) : (Math.sin(2 * Math.PI * f * t) > 0 ? 1 : -1);
    sm *= Math.min(1, i / 80, (n - i) / 80) * 0.3 * 127;
    u8(44 + i, sm + 128 | 0);
  }
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
}
var S = {
  eat: synth(660, 's', 0.08),
  bA: synth(880, 'q', 0.12),
  bB: synth(1100, 'q', 0.1),
  die: synth(200, 's', 0.3)
};
function play(url) { new Audio(url).play().catch(function() {}); }
function sEat(b) { play(b ? S.bA : S.eat); if (b) setTimeout(function() { play(S.bB); }, 70); }

// iOS 解锁
var audOk = false;
function unlock() {
  if (audOk) return;
  audOk = true;
  var a = new Audio(S.eat); a.volume = 0; a.play().catch(function() {});
  document.removeEventListener('touchstart', unlock);
  document.removeEventListener('click', unlock);
  document.removeEventListener('keydown', unlock);
}
document.addEventListener('touchstart', unlock);
document.addEventListener('click', unlock);
document.addEventListener('keydown', unlock);

// ---- 排行榜 ----
function lbLoad() { try { return JSON.parse(localStorage.snakeLB || '[]'); } catch(e) { return []; } }
function lbSave(e) {
  var l = lbLoad(); l.push(e);
  l.sort(function(a, b) { return b.score - a.score; });
  localStorage.snakeLB = JSON.stringify(l.slice(0, 10));
}
function lbShow(hl) {
  var l = lbLoad();
  if (!l.length) { E.lb.innerHTML = '<div class="lb-empty">暂无记录</div>'; return; }
  E.lb.innerHTML = l.map(function(e, i) {
    var hlCls = e.id === hl ? ' highlight' : '';
    var rk = '';
    var rankIcon = '#' + (i + 1);
    if (i === 0) { rk = 'gold'; rankIcon = '🥇'; }
    else if (i === 1) { rk = 'silver'; rankIcon = '🥈'; }
    else if (i === 2) { rk = 'bronze'; rankIcon = '🥉'; }
    return '<div class="lb-row' + hlCls + '">' +
      '<span class="lb-rank ' + rk + '">' + rankIcon + '</span>' +
      '<span class="lb-date">' + e.date + '</span>' +
      '<span class="lb-score">' + e.score + '</span></div>';
  }).join('');
}

// ---- 最高分 ----
try { best = parseInt(localStorage.snakeBest, 10) || 0; } catch(e) { best = 0; }
if (isNaN(best)) best = 0;
E.best.textContent = best;

// ---- 速度 ----
function spd() { return Math.max(40, 100 - lv * 5); }

// ---- init ----
function init() {
  var mx = W >> 1, my = H >> 1;
  snake = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }];
  dir = { x: 1, y: 0 };
  next = { x: 1, y: 0 };
  score = 0; lv = 0; ateCount = 0; elapsed = 0;
  pars = []; bonus = null; clearTimeout(bTimer);
  run = true; paused = false;
  E.score.textContent = '0';
  E.timer.textContent = '00:00';
  E.lvl.textContent = 'Lv.1';
  E.overlay.classList.remove('show');
  startTime = Date.now();
  clearInterval(tick);
  tick = setInterval(tickT, 1000);
  spawnF();
}
function tickT() {
  if (!run || paused) return;
  elapsed = (Date.now() - startTime) / 1000 | 0;
  E.timer.textContent = String(elapsed / 60 | 0).padStart(2, '0') + ':' + String(elapsed % 60).padStart(2, '0');
}

// ---- 食物 ----
function freeC() {
  var occ = {};
  for (var i = 0; i < snake.length; i++) occ[snake[i].x + ',' + snake[i].y] = 1;
  if (bonus) occ[bonus.x + ',' + bonus.y] = 1;
  var f = [];
  for (var x = 0; x < W; x++)
    for (var y = 0; y < H; y++)
      if (!occ[x + ',' + y]) f.push({ x: x, y: y });
  return f.length ? f[Math.random() * f.length | 0] : null;
}
function spawnF() { var c = freeC(); if (c) food = c; }
function spawnB() {
  bonus = freeC();
  if (bonus) bTimer = setTimeout(function() { bonus = null; }, 8000);
}
function tryB() {
  if (!bonus && ateCount && ateCount % 3 === 0 && Math.random() < 0.7) spawnB();
}

// ---- 粒子 ----
function burst(x, y, clr, n) {
  n = n || 12;
  var cx = x * G + G / 2, cy = y * G + G / 2;
  for (var i = 0; i < n; i++) {
    var a = Math.PI * 2 * i / n + Math.random() * 0.4;
    var sp = 1.5 + Math.random() * 3;
    pars.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, dec: 0.02 + Math.random() * 0.04, color: clr });
  }
}
function burstSnake() {
  for (var i = 0; i < snake.length; i++) burst(snake[i].x, snake[i].y, '#00ff88', 6);
}

// ---- 触觉 ----
function vibe() { try { navigator.vibrate(30); } catch(e) {} }

// ---- 吃食物 ----
function eat(f, b) {
  var t = b ? { pts: 30, color: '#ffd700' } : { pts: 10, color: '#e94560' };
  score += t.pts; ateCount++;
  E.score.textContent = score;
  sEat(b); vibe();
  burst(f.x, f.y, t.color, b ? 18 : 12);
  if (b) { bonus = null; clearTimeout(bTimer); }
  else { spawnF(); tryB(); }

  var nl = score / 50 | 0;
  if (nl !== lv) {
    lv = nl;
    E.lvl.textContent = 'Lv.' + (lv + 1);
    clearInterval(loop);
    loop = setInterval(tick, spd());
  }
}

// ---- update ----
function update() {
  if (!run || paused) return;
  dir = { x: next.x, y: next.y };
  var h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (h.x < 0 || h.x >= W || h.y < 0 || h.y >= H) return die();

  for (var i = 0; i < snake.length; i++) {
    if (snake[i].x === h.x && snake[i].y === h.y) return die();
  }

  snake.unshift(h);
  var ate = false;
  if (food && h.x === food.x && h.y === food.y) { eat(food, false); ate = true; }
  if (!ate && bonus && h.x === bonus.x && h.y === bonus.y) { eat(bonus, true); ate = true; }
  if (!ate) snake.pop();

  for (var i = pars.length - 1; i >= 0; i--) {
    var p = pars[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.dec;
    if (p.life <= 0) pars.splice(i, 1);
  }
}

// ---- draw ----
function draw() {
  var ctx = E.ctx;
  ctx.clearRect(0, 0, E.canvas.width, E.canvas.height);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x <= W; x++) { ctx.beginPath(); ctx.moveTo(x * G, 0); ctx.lineTo(x * G, E.canvas.height); ctx.stroke(); }
  for (var y = 0; y <= H; y++) { ctx.beginPath(); ctx.moveTo(0, y * G); ctx.lineTo(E.canvas.width, y * G); ctx.stroke(); }

  // particles
  for (var i = 0; i < pars.length; i++) {
    var p = pars[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // food
  if (food) {
    var fx = food.x * G + G / 2, fy = food.y * G + G / 2, fr = G / 2 - 2;
    ctx.fillStyle = '#e94560';
    ctx.shadowColor = '#e94560'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // bonus
  if (bonus) {
    var cx = bonus.x * G + G / 2, cy = bonus.y * G + G / 2, r = G / 2 - 2;
    var pulse = 1 + Math.sin(Date.now() / 180) * 0.12;
    ctx.save(); ctx.translate(cx, cy); ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 16;
    ctx.beginPath();
    for (var i = 0; i < 10; i++) {
      var rad = i % 2 ? r * 0.4 : r, a = Math.PI * 2 * i / 10 - Math.PI / 2;
      var px = Math.cos(a) * rad, py = Math.sin(a) * rad;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.font = 'bold 9px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('+30', 0, 1);
    ctx.restore();
  }

  // snake
  for (var i = 0; i < snake.length; i++) {
    var s = snake[i];
    var alpha = 1 - i / (snake.length + 10) * 0.6;
    var clr = i === 0 ? '#00ff88' : 'rgba(0,230,118,' + alpha + ')';
    var pad = i === 0 ? 0 : 1, rr = i === 0 ? 3 : 2;
    var rx = s.x * G + pad, ry = s.y * G + pad, rw = G - pad * 2, rh = G - pad * 2;
    ctx.fillStyle = clr; ctx.beginPath();
    ctx.moveTo(rx + rr, ry); ctx.lineTo(rx + rw - rr, ry);
    ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + rr);
    ctx.lineTo(rx + rw, ry + rh - rr);
    ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - rr, ry + rh);
    ctx.lineTo(rx + rr, ry + rh);
    ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - rr);
    ctx.lineTo(rx, ry + rr);
    ctx.quadraticCurveTo(rx, ry, rx + rr, ry);
    ctx.fill();
  }

  // date
  var now = new Date();
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0'), E.canvas.width - 8, E.canvas.height - 8);

  // pause
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(0, 0, E.canvas.width, E.canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂停中', E.canvas.width / 2, E.canvas.height / 2);
  }
}

// ---- 死亡 ----
function die() {
  run = false; clearInterval(loop); clearInterval(tick); clearTimeout(bTimer);
  bonus = null;
  play(S.die); setTimeout(vibe, 50);
  burstSnake();

  if (score > best) { best = score; E.best.textContent = best; try { localStorage.snakeBest = String(best); } catch(e) {} }
  var n = new Date();
  var ds = (n.getMonth() + 1) + '/' + n.getDate() + ' ' + String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  var id = Date.now();
  lbSave({ score: score, date: ds, id: id });
  E.fScore.textContent = score;
  E.fTime.textContent = E.timer.textContent;
  E.fLen.textContent = snake.length;
  lbShow(id);
  E.overlay.classList.add('show');
}

function re() { init(); startL(); }

E.overlay.querySelector('.btn').onclick = function(e) { e.stopPropagation(); re(); };
E.overlay.onclick = function(e) { if (e.target === E.overlay) re(); };

// ---- 方向 ----
function go(d) {
  if (dir.x === -d.x && dir.y === -d.y) return;
  next = d;
  if (!run) re();
  showJoy(false);
}

// ---- 摇杆显隐 ----
var joyVis = true;
function showJoy(v) {
  if (joyVis === v) return;
  joyVis = v;
  E.joyW.classList.toggle('hidden-joy', !v);
}
showJoy(!matchMedia('(pointer:fine) and (hover:hover)').matches);

// ---- 暂停 ----
function tp() {
  if (!run) return re();
  paused = !paused;
  if (paused) { clearInterval(tick); }
  else { startTime = Date.now() - elapsed * 1000; tick = setInterval(tickT, 1000); }
}

// ---- 画布触摸 ----
var sx, sy, sw;
E.canvas.addEventListener('touchstart', function(e) {
  if (!run) { re(); return; }
  var t = e.touches[0];
  sx = t.clientX; sy = t.clientY; sw = true;
}, { passive: true });

E.canvas.addEventListener('touchmove', function(e) {
  if (!sw) return;
  e.preventDefault();
  var dx = e.touches[0].clientX - sx;
  var dy = e.touches[0].clientY - sy;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  sw = false;
  if (Math.abs(dx) > Math.abs(dy))
    go(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
  else
    go(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
}, { passive: false });

E.canvas.addEventListener('touchend', function() {
  if (sw) { sw = false; tp(); }
});

E.canvas.addEventListener('click', function() { tp(); });

// ---- 摇杆 ----
var joyOn = false;
var DIRS = [{ x: 1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }, { x: -1, y: 0 }];

function jPos(e) {
  var t = e.touches[0], r = E.joy.getBoundingClientRect();
  var dx = t.clientX - (r.left + r.width / 2), dy = t.clientY - (r.top + r.height / 2);
  var d = Math.sqrt(dx * dx + dy * dy), max = 33;
  if (d > max) { dx = dx / d * max; dy = dy / d * max; }
  E.thumb.style.left = 'calc(50% + ' + dx + 'px)';
  E.thumb.style.top = 'calc(50% + ' + dy + 'px)';
  if (d < 14) return;
  var a = Math.atan2(dy, dx);
  var i = a > -Math.PI / 4 && a <= Math.PI / 4 ? 0 :
          a > Math.PI / 4 && a <= 3 * Math.PI / 4 ? 1 :
          a > -3 * Math.PI / 4 && a <= -Math.PI / 4 ? 2 : 3;
  go(DIRS[i]);
}

var jS = function(e) { e.preventDefault(); joyOn = true; jPos(e); };
var jM = function(e) { if (!joyOn) return; e.preventDefault(); jPos(e); };
var jE = function(e) { e.preventDefault(); joyOn = false; E.thumb.style.left = '50%'; E.thumb.style.top = '50%'; };

E.joy.addEventListener('touchstart', jS, { passive: false });
E.joy.addEventListener('touchmove', jM, { passive: false });
E.joy.addEventListener('touchend', jE);
E.joy.addEventListener('touchcancel', jE);

// ---- 键盘 ----
var KM = {
  ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
  ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
  w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 }
};
document.addEventListener('keydown', function(e) {
  var k = KM[e.key.toLowerCase()];
  if (k) { e.preventDefault(); go(k); }
  if (e.key === ' ') { e.preventDefault(); tp(); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); re(); }
});

// ---- 防下拉刷新 ----
document.addEventListener('touchmove', function(e) {
  if (e.target === E.canvas || e.target.closest('.joystick-base')) e.preventDefault();
}, { passive: false });

// ---- 主循环 ----
function tick() { update(); draw(); }
function startL() { clearInterval(loop); loop = setInterval(tick, spd()); }

init();
startL();
})();
</script>
