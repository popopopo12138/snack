<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #222244;
    --border: #3a3a6a;
    --accent: #e94560;
    --gold: #ffd700;
    --green: #00e676;
    --text: #ddd;
    --muted: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    padding: 12px;
  }

  /* ── header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
  }
  .stat { text-align: center; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-score .stat-value { color: var(--accent); }
  .stat-timer .stat-value { color: #c0a060; }
  .stat-best  .stat-value { color: #8ecae6; }

  /* ── canvas area ── */
  .game-area {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(233,69,96,0.08), 0 0 80px rgba(0,0,0,0.3);
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
    background: #1e1e3a;
  }

  /* ── overlay ── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,30,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay-title { font-size: 26px; font-weight: 800; }
  .overlay-score { font-size: 38px; font-weight: 800; color: var(--accent); }
  .overlay-stats { font-size: 13px; color: #aaa; display: flex; gap: 16px; margin-bottom: 4px; }
  .overlay-stats span { color: #ddd; }

  .btn {
    font-size: 15px;
    padding: 10px 32px;
    border: 2px solid var(--accent);
    border-radius: 24px;
    color: var(--accent);
    background: transparent;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn:active { background: var(--accent); color: #fff; transform: scale(0.96); }

  /* ── leaderboard in overlay ── */
  .lb-wrap { margin-top: 10px; width: 100%; max-width: 260px; }
  .lb-title {
    font-size: 12px;
    color: #c0a060;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 8px;
  }
  .lb-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    color: #888;
    transition: background 0.2s;
  }
  .lb-row.highlight { background: rgba(233,69,96,0.12); color: var(--accent); }
  .lb-rank { width: 26px; font-weight: 700; }
  .lb-rank.gold { color: #ffd700; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-date { flex: 1; text-align: left; }
  .lb-score { font-weight: 700; }
  .lb-empty { color: #555; font-size: 13px; text-align: center; padding: 10px; }

  /* ── joystick ── */
  .joystick-base {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
    border: 2px solid rgba(255,255,255,0.12);
    position: relative;
    touch-action: none;
  }
  .joystick-base::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .joystick-thumb {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(233,69,96,0.5), rgba(233,69,96,0.2));
    border: 2px solid rgba(233,69,96,0.25);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: width 0.15s, height 0.15s;
  }
  .joystick-base:active .joystick-thumb { width: 46px; height: 46px; }

  /* ── hint ── */
  .hint {
    color: #555;
    font-size: 12px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .hint kbd {
    color: var(--accent);
    background: rgba(233,69,96,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    border: 1px solid rgba(233,69,96,0.15);
  }

  /* ── speed indicator dots ── */
  .speed-dots {
    position: absolute;
    top: 10px; right: 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    pointer-events: none;
  }
  .speed-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .speed-dot.on { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="stat stat-score">
      <div class="stat-label">分数</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat stat-timer">
      <div class="stat-label">时间</div>
      <div class="stat-value" id="timer">00:00</div>
    </div>
    <div class="stat stat-best">
      <div class="stat-label">最高</div>
      <div class="stat-value" id="best">0</div>
    </div>
  </div>

  <div class="game-area" id="gameArea">
    <canvas id="canvas"></canvas>

    <div class="speed-dots" id="speedDots"></div>

    <div class="overlay" id="overlay">
      <div class="overlay-title">游戏结束</div>
      <div class="overlay-score" id="finalScore">0</div>
      <div class="overlay-stats">
        用时 <span id="finalTime">00:00</span>
        &nbsp;·&nbsp;
        长度 <span id="finalLen">3</span>
      </div>
      <button class="btn">再来一局</button>
      <div class="lb-wrap">
        <div class="lb-title">🏆 排行榜</div>
        <div id="lbList"></div>
      </div>
    </div>
  </div>

  <div class="joystick-base" id="joystick">
    <div class="joystick-thumb" id="thumb"></div>
  </div>

  <div class="hint">
    键盘 <kbd>WASD</kbd> <kbd>↑↓←→</kbd> &nbsp;·&nbsp; 画面划动 &nbsp;·&nbsp; 摇杆
  </div>
</div>

<script>
// ──── DOM ────
const $ = s => document.getElementById(s);
const canvas = $('canvas');
const ctx = canvas.getContext('2d');
const els = {
  score: $('score'), best: $('best'), timer: $('timer'),
  overlay: $('overlay'), finalScore: $('finalScore'), finalTime: $('finalTime'),
  finalLen: $('finalLen'), lbList: $('lbList'), speedDots: $('speedDots'),
  gameArea: $('gameArea'), thumb: $('thumb'), joystick: $('joystick'),
};

// ──── 常量 ────
const GRID = 20, COLS = 25, ROWS = 25;
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;
const FOOD_NORMAL = { pts: 10, color: '#e94560', glow: '#e94560' };
const FOOD_BONUS  = { pts: 30, color: '#ffd700', glow: '#ffd700' };

// ──── 状态 ────
let snake, food, bonusFood, bonusTimer, dir, nextDir;
let score, best, gameLoop, running, paused, speedLevel, foodsEaten;
let elapsed, timerTick, startTime;
let particles = [];

// ──── 音效 ────
function synth(freq, type, dur) {
  const sr = 8000, n = sr * dur | 0;
  const buf = new ArrayBuffer(44 + n), v = new DataView(buf);
  const u8 = (o, x) => v.setUint8(o, x, true);
  const u32 = (o, x) => v.setUint32(o, x, true);
  const u16 = (o, x) => v.setInt16(o, x, true);
  const str = (o, s) => { for (let i = 0; i < s.length; i++) u8(o + i, s.charCodeAt(i)); };
  str(0, 'RIFF'); u32(4, 36 + n); str(8, 'WAVE');
  str(12, 'fmt '); u32(16, 16); u16(20, 1); u16(22, 1); u32(24, sr); u32(28, sr); u16(32, 1); u16(34, 8);
  str(36, 'data'); u32(40, n);
  for (let i = 0; i < n; i++) {
    const t = i / sr;
    let s = type === 'sine' ? Math.sin(2 * Math.PI * freq * t) : (Math.sin(2 * Math.PI * freq * t) > 0 ? 1 : -1);
    s *= Math.min(1, i / 80, (n - i) / 80) * 0.3 * 127;
    u8(44 + i, s + 128 | 0);
  }
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
}
const sfx = {
  eat: synth(660, 'sine', 0.08),
  bonusA: synth(880, 'square', 0.12),
  bonusB: synth(1100, 'square', 0.1),
  die: synth(200, 'sine', 0.3),
};
function play(url) { new Audio(url).play().catch(() => {}); }
function sfxEat(bonus) {
  if (bonus) { play(sfx.bonusA); setTimeout(() => play(sfx.bonusB), 70); }
  else play(sfx.eat);
}

// ──── iOS 音频解锁 ────
let audioOk = false;
function unlock() {
  if (audioOk) return;
  audioOk = true;
  const a = new Audio(sfx.eat); a.volume = 0; a.play().catch(() => {});
  ['touchstart','click','keydown'].forEach(e => document.removeEventListener(e, unlock));
}
['touchstart','click','keydown'].forEach(e => document.addEventListener(e, unlock));

// ──── 排行榜 ────
function loadLB() { try { return JSON.parse(localStorage.snakeLB || '[]'); } catch(_) { return []; } }
function saveLB(e) {
  const lb = loadLB();
  lb.push(e);
  lb.sort((a, b) => b.score - a.score);
  localStorage.snakeLB = JSON.stringify(lb.slice(0, 10));
}
function rankStyle(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  if (i === 2) return 'bronze';
  return '';
}
function renderLB(hlId) {
  const lb = loadLB();
  if (!lb.length) { els.lbList.innerHTML = '<div class="lb-empty">暂无记录</div>'; return; }
  els.lbList.innerHTML = lb.map((e, i) => {
    const hl = e.id === hlId ? ' highlight' : '';
    const rk = rankStyle(i);
    return `<div class="lb-row${hl}">
      <span class="lb-rank ${rk}">${rk ? ['🥇','🥈','🥉'][i] : '#'+(i+1)}</span>
      <span class="lb-date">${e.date}</span>
      <span class="lb-score">${e.score}</span>
    </div>`;
  }).join('');
}

// ──── best ────
try { best = parseInt(localStorage.snakeBest, 10) || 0; } catch(_) { best = 0; }
if (isNaN(best)) best = 0;
els.best.textContent = best;

// ──── 速度档位指示点 ────
function buildSpeedDots() {
  const maxDots = 12;
  els.speedDots.innerHTML = Array.from({ length: maxDots }, () => '<div class="speed-dot"></div>').join('');
}
buildSpeedDots();
function updateSpeedDots() {
  const dots = els.speedDots.children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('on', i < speedLevel);
  }
}

// ──── 速度 ────
function interval() { return Math.max(40, 100 - speedLevel * 5); }

// ──── 初始化 ────
function init() {
  const mx = COLS >> 1, my = ROWS >> 1;
  snake = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }];
  dir = nextDir = { x: 1, y: 0 };
  score = speedLevel = foodsEaten = elapsed = 0;
  particles = [];
  bonusFood = null;
  clearTimeout(bonusTimer);
  running = true;
  paused = false;

  els.score.textContent = '0';
  els.timer.textContent = '00:00';
  els.overlay.classList.remove('show');
  updateSpeedDots();

  startTime = Date.now();
  clearInterval(timerTick);
  timerTick = setInterval(tickTimer, 1000);
  spawnFood();
}

function tickTimer() {
  if (!running || paused) return;
  elapsed = (Date.now() - startTime) / 1000 | 0;
  els.timer.textContent = String(elapsed / 60 | 0).padStart(2, '0') + ':' + String(elapsed % 60).padStart(2, '0');
}

function freeCell() {
  const occ = new Set(snake.map(s => `${s.x},${s.y}`));
  if (bonusFood) occ.add(`${bonusFood.x},${bonusFood.y}`);
  const free = [];
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      if (!occ.has(`${x},${y}`)) free.push({ x, y });
  return free.length ? free[Math.random() * free.length | 0] : null;
}

function spawnFood() { const c = freeCell(); if (c) food = c; }

function spawnBonus() {
  bonusFood = freeCell();
  if (!bonusFood) return;
  bonusTimer = setTimeout(() => { bonusFood = null; }, 8000);
}
function tryBonus() {
  if (bonusFood) return;
  if (foodsEaten && foodsEaten % 3 === 0 && Math.random() < 0.7) spawnBonus();
}

// ──── 粒子 ────
function burst(x, y, color) {
  const cx = x * GRID + GRID / 2, cy = y * GRID + GRID / 2;
  const n = color === FOOD_BONUS.color ? 18 : 12;
  for (let i = 0; i < n; i++) {
    const a = Math.PI * 2 * i / n + Math.random() * 0.4;
    const sp = 1.5 + Math.random() * 3;
    particles.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, dec: 0.02 + Math.random() * 0.04, color });
  }
}

// ──── 游戏逻辑 ────
function eat(f, isBonus) {
  score += isBonus ? FOOD_BONUS.pts : FOOD_NORMAL.pts;
  foodsEaten++;
  els.score.textContent = score;
  sfxEat(isBonus);
  burst(f.x, f.y, isBonus ? FOOD_BONUS.color : FOOD_NORMAL.color);

  if (isBonus) { bonusFood = null; clearTimeout(bonusTimer); }
  else { spawnFood(); tryBonus(); }

  const lv = score / 50 | 0;
  if (lv !== speedLevel) {
    speedLevel = lv;
    updateSpeedDots();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, interval());
  }
}

function update() {
  if (!running || paused) return;
  dir = { ...nextDir };
  const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (h.x < 0 || h.x >= COLS || h.y < 0 || h.y >= ROWS) return die();
  if (snake.some(s => s.x === h.x && s.y === h.y)) return die();

  snake.unshift(h);
  let ate = false;
  if (h.x === food.x && h.y === food.y) { eat(food, false); ate = true; }
  if (!ate && bonusFood && h.x === bonusFood.x && h.y === bonusFood.y) { eat(bonusFood, true); ate = true; }
  if (!ate) snake.pop();

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.dec;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ──── 渲染 ────
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke(); }

  // 粒子
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 普通食物
  const fd = { x: food.x * GRID + GRID / 2, y: food.y * GRID + GRID / 2, r: GRID / 2 - 2 };
  ctx.fillStyle = FOOD_NORMAL.color;
  ctx.shadowColor = FOOD_NORMAL.glow;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(fd.x, fd.y, fd.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 金色奖励食物
  if (bonusFood) {
    const cx = bonusFood.x * GRID + GRID / 2, cy = bonusFood.y * GRID + GRID / 2;
    const r = GRID / 2 - 2, pulse = 1 + Math.sin(Date.now() / 180) * 0.12;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = FOOD_BONUS.color;
    ctx.shadowColor = FOOD_BONUS.glow;
    ctx.shadowBlur = 16;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const radius = i % 2 ? r * 0.4 : r;
      const angle = Math.PI * 2 * i / 10 - Math.PI / 2;
      const px = Math.cos(angle) * radius, py = Math.sin(angle) * radius;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = 'bold 9px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+30', 0, 1);
    ctx.restore();
  }

  // 蛇
  snake.forEach((s, i) => {
    const alpha = 1 - i / (snake.length + 10) * 0.6;
    const color = i === 0 ? '#00ff88' : `rgba(0,230,118,${alpha})`;
    const pad = i === 0 ? 0 : 1;
    const r = i === 0 ? 3 : 2;
    ctx.fillStyle = color;
    ctx.beginPath();
    const rx = s.x * GRID + pad, ry = s.y * GRID + pad, rw = GRID - pad * 2, rh = GRID - pad * 2;
    ctx.moveTo(rx + r, ry);
    ctx.lineTo(rx + rw - r, ry);
    ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
    ctx.lineTo(rx + rw, ry + rh - r);
    ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
    ctx.lineTo(rx + r, ry + rh);
    ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
    ctx.lineTo(rx, ry + r);
    ctx.quadraticCurveTo(rx, ry, rx + r, ry);
    ctx.fill();
  });

  // 日期
  const now = new Date();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`, canvas.width - 8, canvas.height - 8);

  // 暂停蒙层
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂停中', canvas.width / 2, canvas.height / 2);
  }
}

// ──── 死亡 / 重开 ────
function die() {
  running = false;
  clearInterval(gameLoop);
  clearInterval(timerTick);
  clearTimeout(bonusTimer);
  bonusFood = null;
  play(sfx.die);

  if (score > best) {
    best = score;
    els.best.textContent = best;
    try { localStorage.snakeBest = String(best); } catch(_) {}
  }

  const now = new Date();
  const ds = `${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  const id = Date.now();
  saveLB({ score, date: ds, id });

  els.finalScore.textContent = score;
  els.finalTime.textContent = els.timer.textContent;
  els.finalLen.textContent = snake.length;
  renderLB(id);
  els.overlay.classList.add('show');
}

function restart() { init(); startLoop(); }

els.overlay.querySelector('.btn').addEventListener('click', e => { e.stopPropagation(); restart(); });
els.overlay.addEventListener('click', e => { if (e.target === els.overlay) restart(); });

// ──── 方向 ────
function go(d) {
  if (dir.x === -d.x && dir.y === -d.y) return;
  nextDir = d;
  if (!running) restart();
}

// ──── 暂停切换 ────
function togglePause() {
  if (!running) return restart();
  paused = !paused;
  if (paused) { clearInterval(timerTick); }
  else { startTime = Date.now() - elapsed * 1000; timerTick = setInterval(tickTimer, 1000); }
}

// ──── 画布事件 ────
let sx, sy, swiping;

canvas.addEventListener('touchstart', e => {
  if (!running) { restart(); return; }
  sx = e.touches[0].clientX; sy = e.touches[0].clientY; swiping = true;
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!swiping) return;
  const dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  swiping = false;
  go(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 }) : (dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 }));
}, { passive: true });

canvas.addEventListener('touchend', () => { if (swiping) { swiping = false; togglePause(); } });
canvas.addEventListener('click', () => togglePause());

// ──── 摇杆 ────
const JR = 55, DEAD = 14;
let joyOn = false;

function joyPos(e) {
  const t = e.touches[0];
  const r = els.joystick.getBoundingClientRect();
  let dx = t.clientX - (r.left + r.width / 2), dy = t.clientY - (r.top + r.height / 2);
  const dist = Math.hypot(dx, dy), max = JR - 22;
  if (dist > max) { dx = dx / dist * max; dy = dy / dist * max; }
  els.thumb.style.left = `calc(50% + ${dx}px)`;
  els.thumb.style.top  = `calc(50% + ${dy}px)`;
  if (dist < DEAD) return;
  const a = Math.atan2(dy, dx);
  const dirs = [{ x: 1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }, { x: -1, y: 0 }];
  const idx = a > -Math.PI / 4 && a <= Math.PI / 4 ? 0 : a > Math.PI / 4 && a <= 3 * Math.PI / 4 ? 1 : a > -3 * Math.PI / 4 && a <= -Math.PI / 4 ? 2 : 3;
  go(dirs[idx]);
}

function js(e)  { e.preventDefault(); joyOn = true; joyPos(e); }
function jm(e)  { if (!joyOn) return; e.preventDefault(); joyPos(e); }
function je(e)  { e.preventDefault(); joyOn = false; els.thumb.style.left = '50%'; els.thumb.style.top = '50%'; }

['touchstart','touchmove','touchend','touchcancel'].forEach((ev, i) => {
  els.joystick.addEventListener(ev, [js, jm, je, je][i], { passive: i > 1 ? undefined : false });
});

// ──── 键盘 ────
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
  };
  const k = map[e.key.toLowerCase()];
  if (k) { e.preventDefault(); go(k); }
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
});

// ──── 主循环 ────
function tick() { update(); draw(); }
function startLoop() { clearInterval(gameLoop); gameLoop = setInterval(tick, interval()); }

init();
startLoop();
</script>
</body>
