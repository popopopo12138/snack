<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #22223a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    padding: 12px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: #2c2c52;
    border: 1px solid #4a4a7a;
    border-radius: 12px;
    padding: 12px 18px;
  }
  .topbar .item { text-align: center; }
  .topbar .item .lbl { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .topbar .item .val { font-size: 22px; font-weight: 700; }
  #scoreVal { color: #e94560; }
  #timerVal { color: #c0a060; }
  #bestVal  { color: #8ecae6; }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(233,69,96,0.08), 0 0 80px rgba(0,0,0,0.3);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    background: #282850;
  }
  .lv {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(233,69,96,0.15);
    color: #e94560;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    pointer-events: none;
    border: 1px solid rgba(233,69,96,0.25);
  }
  .end {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,30,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .end.on { opacity: 1; pointer-events: auto; }
  .end h2 { font-size: 26px; font-weight: 800; }
  .end .big { font-size: 38px; font-weight: 800; color: #e94560; }
  .end .info { font-size: 13px; color: #aaa; display: flex; gap: 16px; margin-bottom: 4px; }
  .end .info b { color: #ddd; }
  .end .btn {
    font-size: 15px;
    padding: 10px 32px;
    border: 2px solid #e94560;
    border-radius: 24px;
    color: #e94560;
    background: transparent;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .end .btn:active { background: #e94560; color: #fff; transform: scale(0.96); }
  .end .lb { margin-top: 10px; width: 100%; max-width: 260px; }
  .end .lb .ttl {
    font-size: 12px;
    color: #c0a060;
    letter-spacing: 2px;
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 8px;
  }
  .end .lb .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    color: #888;
  }
  .end .lb .row.hi { background: rgba(233,69,96,0.12); color: #e94560; }
  .end .lb .r { width: 26px; font-weight: 700; }
  .end .lb .r.g { color: #ffd700; }
  .end .lb .r.s { color: #c0c0c0; }
  .end .lb .r.b { color: #cd7f32; }
  .end .lb .d { flex: 1; text-align: left; }
  .end .lb .s { font-weight: 700; }

  .joy-base {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
    border: 2px solid rgba(255,255,255,0.12);
    position: relative;
    touch-action: none;
  }
  .joy-base::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .joy-thumb {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(233,69,96,0.5), rgba(233,69,96,0.2));
    border: 2px solid rgba(233,69,96,0.25);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: width 0.15s, height 0.15s;
  }

  .tip { color: #777; font-size: 12px; text-align: center; letter-spacing: 0.5px; }
  .tip kbd {
    color: #e94560;
    background: rgba(233,69,96,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    border: 1px solid rgba(233,69,96,0.15);
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="item"><div class="lbl">分数</div><div class="val" id="scoreVal">0</div></div>
    <div class="item"><div class="lbl">时间</div><div class="val" id="timerVal">00:00</div></div>
    <div class="item"><div class="lbl">最高</div><div class="val" id="bestVal">0</div></div>
  </div>

  <div class="stage">
    <canvas id="c"></canvas>
    <div class="lv" id="lvBadge">Lv.1</div>
    <div class="end" id="endPanel">
      <h2>游戏结束</h2>
      <div class="big" id="endScore">0</div>
      <div class="info">用时 <b id="endTime">00:00</b> · 长度 <b id="endLen">3</b></div>
      <button class="btn" id="endBtn">再来一局</button>
      <div class="lb">
        <div class="ttl">🏆 排行榜</div>
        <div id="lbList"></div>
      </div>
    </div>
  </div>

  <div class="joy-base" id="joy">
    <div class="joy-thumb" id="thumb"></div>
  </div>

  <div class="tip">
    键盘 <kbd>WASD</kbd> <kbd>↑↓←→</kbd> · 画面划动 · 摇杆 &nbsp;|&nbsp; <kbd>R</kbd> 重开
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

  var scoreEl = document.getElementById('scoreVal');
  var timerEl = document.getElementById('timerVal');
  var bestEl  = document.getElementById('bestVal');
  var lvEl    = document.getElementById('lvBadge');
  var endEl   = document.getElementById('endPanel');
  var endSc   = document.getElementById('endScore');
  var endTm   = document.getElementById('endTime');
  var endLn   = document.getElementById('endLen');
  var endBtn  = document.getElementById('endBtn');
  var lbEl    = document.getElementById('lbList');
  var joyEl   = document.getElementById('joy');
  var thumbEl = document.getElementById('thumb');

  var GRID = 20;
  var COLS = 25;
  var ROWS = 25;
  canvas.width  = COLS * GRID;
  canvas.height = ROWS * GRID;

  var snake, food, bonus, bonusTimer, dir, nextDir;
  var score, best, loopId, running, paused, level, eatCount;
  var elapsed, timerId, startTime;
  var particles = [];

  // ---- 音效 ----
  function makeWav(freq, type, dur) {
    var sr = 8000;
    var n = Math.floor(sr * dur);
    var buf = new ArrayBuffer(44 + n);
    var v = new DataView(buf);
    var p = 0;
    function w1(x) { v.setUint8(p, x, true); p++; }
    function w2h(x) { v.setInt16(p, x, true); p += 2; }
    function w4(x) { v.setUint32(p, x, true); p += 4; }
    function ws(s) { for (var i = 0; i < s.length; i++) w1(s.charCodeAt(i)); }

    ws('RIFF'); w4(36 + n); ws('WAVE');
    ws('fmt '); w4(16); w2h(1); w2h(1); w4(sr); w4(sr); w2h(1); w2h(8);
    ws('data'); w4(n);

    for (var i = 0; i < n; i++) {
      var t = i / sr;
      var sm = type === 'sine'
        ? Math.sin(2 * Math.PI * freq * t)
        : (Math.sin(2 * Math.PI * freq * t) > 0 ? 1 : -1);
      var env = Math.min(1, i / 80, (n - i) / 80);
      sm = sm * env * 0.3 * 127;
      w1(Math.round(sm + 128));
    }
    return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
  }

  var SFX_EAT     = makeWav(660, 'sine', 0.08);
  var SFX_BONUS_A = makeWav(880, 'square', 0.12);
  var SFX_BONUS_B = makeWav(1100, 'square', 0.1);
  var SFX_DIE     = makeWav(200, 'sine', 0.3);

  function playSfx(url) {
    try { new Audio(url).play().catch(function () {}); } catch (e) {}
  }

  function playEat(bonus) {
    if (bonus) {
      playSfx(SFX_BONUS_A);
      setTimeout(function () { playSfx(SFX_BONUS_B); }, 70);
    } else {
      playSfx(SFX_EAT);
    }
  }

  var audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    var a = new Audio(SFX_EAT);
    a.volume = 0;
    a.play().catch(function () {});
  }
  document.addEventListener('touchstart', unlockAudio, { once: true });
  document.addEventListener('click', unlockAudio, { once: true });
  document.addEventListener('keydown', unlockAudio, { once: true });

  // ---- 排行榜 ----
  function loadLB() {
    try { return JSON.parse(localStorage.getItem('s2_lb') || '[]'); } catch (e) { return []; }
  }
  function saveLB(entry) {
    var lb = loadLB();
    lb.push(entry);
    lb.sort(function (a, b) { return b.score - a.score; });
    localStorage.setItem('s2_lb', JSON.stringify(lb.slice(0, 10)));
  }
  function showLB(hlId) {
    var lb = loadLB();
    if (lb.length === 0) {
      lbEl.innerHTML = '<div style="color:#555;font-size:13px;text-align:center;padding:10px;">暂无记录</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < lb.length; i++) {
      var e = lb[i];
      var hi = e.id === hlId ? ' hi' : '';
      var rkCls = '', icon = '#' + (i + 1);
      if (i === 0) { rkCls = 'g'; icon = '🥇'; }
      else if (i === 1) { rkCls = 's'; icon = '🥈'; }
      else if (i === 2) { rkCls = 'b'; icon = '🥉'; }
      html += '<div class="row' + hi + '"><span class="r ' + rkCls + '">' + icon + '</span><span class="d">' + e.date + '</span><span class="s">' + e.score + '</span></div>';
    }
    lbEl.innerHTML = html;
  }

  try { best = parseInt(localStorage.getItem('snakeBest'), 10) || 0; } catch (e) { best = 0; }
  if (isNaN(best)) best = 0;
  bestEl.textContent = best;

  function getSpeed() {
    return Math.max(40, 100 - level * 5);
  }

  function freeCell() {
    var used = {};
    for (var i = 0; i < snake.length; i++) {
      used[snake[i].x + ',' + snake[i].y] = true;
    }
    if (bonus) {
      used[bonus.x + ',' + bonus.y] = true;
    }
    var free = [];
    for (var x = 0; x < COLS; x++) {
      for (var y = 0; y < ROWS; y++) {
        if (!used[x + ',' + y]) {
          free.push({ x: x, y: y });
        }
      }
    }
    if (free.length === 0) return null;
    return free[Math.floor(Math.random() * free.length)];
  }

  function spawnFood() {
    var c = freeCell();
    if (c) food = c;
  }

  function spawnBonus() {
    bonus = freeCell();
    if (bonus) {
      bonusTimer = setTimeout(function () { bonus = null; }, 8000);
    }
  }

  function tryBonus() {
    if (bonus) return;
    if (eatCount > 0 && eatCount % 3 === 0 && Math.random() < 0.7) {
      spawnBonus();
    }
  }

  function addParticles(x, y, color, count) {
    var cx = x * GRID + GRID / 2;
    var cy = y * GRID + GRID / 2;
    for (var i = 0; i < count; i++) {
      var angle = (Math.PI * 2 * i / count) + Math.random() * 0.4;
      var speed = 1.5 + Math.random() * 3;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.04,
        color: color
      });
    }
  }

  function vibrate() {
    try { if (navigator.vibrate) navigator.vibrate(30); } catch (e) {}
  }

  function eatFood(f, isBonus) {
    if (isBonus) {
      score += 30;
      eatCount++;
      playEat(true);
      vibrate();
      addParticles(f.x, f.y, '#ffd700', 18);
      bonus = null;
      clearTimeout(bonusTimer);
    } else {
      score += 10;
      eatCount++;
      playEat(false);
      vibrate();
      addParticles(f.x, f.y, '#e94560', 12);
      spawnFood();
      tryBonus();
    }
    scoreEl.textContent = score;

    var newLevel = Math.floor(score / 50);
    if (newLevel !== level) {
      level = newLevel;
      lvEl.textContent = 'Lv.' + (level + 1);
      clearInterval(loopId);
      loopId = setInterval(gameTick, getSpeed());
    }
  }

  function update() {
    if (!running || paused) return;

    dir = { x: nextDir.x, y: nextDir.y };
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver();
      return;
    }

    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        gameOver();
        return;
      }
    }

    snake.unshift(head);

    var ate = false;
    if (food && head.x === food.x && head.y === food.y) {
      eatFood(food, false);
      ate = true;
    }

    if (!ate && bonus && head.x === bonus.x && head.y === bonus.y) {
      eatFood(bonus, true);
      ate = true;
    }

    if (!ate) {
      snake.pop();
    }

    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    for (var x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * GRID, 0);
      ctx.lineTo(x * GRID, canvas.height);
      ctx.stroke();
    }
    for (var y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * GRID);
      ctx.lineTo(canvas.width, y * GRID);
      ctx.stroke();
    }

    // particles
    for (var i = 0; i < particles.length; i++) {
      var pp = particles[i];
      ctx.globalAlpha = pp.life;
      ctx.fillStyle = pp.color;
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, 3 * pp.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // food
    if (food) {
      var fx = food.x * GRID + GRID / 2;
      var fy = food.y * GRID + GRID / 2;
      var fr = GRID / 2 - 2;
      ctx.fillStyle = '#e94560';
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(fx, fy, fr, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // bonus food
    if (bonus) {
      var bx = bonus.x * GRID + GRID / 2;
      var by = bonus.y * GRID + GRID / 2;
      var br = GRID / 2 - 2;
      var pulse = 1 + Math.sin(Date.now() / 180) * 0.12;

      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(pulse, pulse);
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      for (var j = 0; j < 10; j++) {
        var rad = j % 2 === 0 ? br : br * 0.4;
        var angle = (Math.PI * 2 * j / 10) - Math.PI / 2;
        var px = Math.cos(angle) * rad;
        var py = Math.sin(angle) * rad;
        if (j === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = 'bold 9px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+30', 0, 1);
      ctx.restore();
    }

    // snake
    for (var i = 0; i < snake.length; i++) {
      var seg = snake[i];
      var alpha = 1 - (i / (snake.length + 10)) * 0.6;
      var color = i === 0 ? '#00ff88' : 'rgba(0,230,118,' + alpha + ')';
      var pad = i === 0 ? 0 : 1;
      var rr = i === 0 ? 3 : 2;
      var rx = seg.x * GRID + pad;
      var ry = seg.y * GRID + pad;
      var rw = GRID - pad * 2;
      var rh = GRID - pad * 2;

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(rx + rr, ry);
      ctx.lineTo(rx + rw - rr, ry);
      ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + rr);
      ctx.lineTo(rx + rw, ry + rh - rr);
      ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - rr, ry + rh);
      ctx.lineTo(rx + rr, ry + rh);
      ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - rr);
      ctx.lineTo(rx, ry + rr);
      ctx.quadraticCurveTo(rx, ry, rx + rr, ry);
      ctx.fill();
    }

    // date
    var now = new Date();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = '10px -apple-system,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(
      now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0'),
      canvas.width - 8,
      canvas.height - 8
    );

    // pause overlay
    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('暂停中', canvas.width / 2, canvas.height / 2);
    }
  }

  function gameOver() {
    running = false;
    clearInterval(loopId);
    clearInterval(timerId);
    clearTimeout(bonusTimer);
    bonus = null;

    playSfx(SFX_DIE);
    setTimeout(vibrate, 50);

    for (var i = 0; i < snake.length; i++) {
      addParticles(snake[i].x, snake[i].y, '#00ff88', 6);
    }

    if (score > best) {
      best = score;
      bestEl.textContent = best;
      try { localStorage.setItem('snakeBest', String(best)); } catch (e) {}
    }

    var now = new Date();
    var dateStr = (now.getMonth() + 1) + '/' + now.getDate() + ' ' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0');
    var entryId = Date.now();
    saveLB({ score: score, date: dateStr, id: entryId });
    showLB(entryId);

    endSc.textContent = score;
    endTm.textContent = timerEl.textContent;
    endLn.textContent = snake.length;
    endEl.classList.add('on');
  }

  function restart() {
    var mx = Math.floor(COLS / 2);
    var my = Math.floor(ROWS / 2);
    snake = [
      { x: mx,     y: my },
      { x: mx - 1, y: my },
      { x: mx - 2, y: my }
    ];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score    = 0;
    level    = 0;
    eatCount = 0;
    elapsed  = 0;
    particles = [];
    bonus = null;
    clearTimeout(bonusTimer);
    running = true;
    paused  = false;

    scoreEl.textContent = '0';
    timerEl.textContent = '00:00';
    lvEl.textContent = 'Lv.1';
    endEl.classList.remove('on');

    startTime = Date.now();
    clearInterval(timerId);
    timerId = setInterval(tickTimer, 1000);

    spawnFood();
    startLoop();
  }

  function tickTimer() {
    if (!running || paused) return;
    elapsed = Math.floor((Date.now() - startTime) / 1000);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function setDir(d) {
    if (dir.x === -d.x && dir.y === -d.y) return;
    nextDir = d;
    if (!running) restart();
  }

  function togglePause() {
    if (!running) {
      restart();
      return;
    }
    paused = !paused;
    if (paused) {
      clearInterval(timerId);
    } else {
      startTime = Date.now() - elapsed * 1000;
      timerId = setInterval(tickTimer, 1000);
    }
  }

  endBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    restart();
  });
  endEl.addEventListener('click', function (e) {
    if (e.target === endEl) restart();
  });

  // ---- canvas touch ----
  var swipeX, swipeY, swiping = false;

  canvas.addEventListener('touchstart', function (e) {
    if (!running) { restart(); return; }
    var t = e.touches[0];
    swipeX = t.clientX;
    swipeY = t.clientY;
    swiping = true;
  }, { passive: true });

  canvas.addEventListener('touchmove', function (e) {
    if (!swiping) return;
    e.preventDefault();
    var dx = e.touches[0].clientX - swipeX;
    var dy = e.touches[0].clientY - swipeY;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    swiping = false;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
    } else {
      setDir(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function () {
    if (swiping) {
      swiping = false;
      togglePause();
    }
  });

  canvas.addEventListener('click', function () {
    togglePause();
  });

  // ---- joystick ----
  var joyOn = false;
  var JOY_MAX = 33;

  function joyUpdate(e) {
    var t = e.touches[0];
    var rect = joyEl.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dx = t.clientX - cx;
    var dy = t.clientY - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > JOY_MAX) {
      dx = (dx / dist) * JOY_MAX;
      dy = (dy / dist) * JOY_MAX;
    }

    thumbEl.style.left = 'calc(50% + ' + dx + 'px)';
    thumbEl.style.top  = 'calc(50% + ' + dy + 'px)';

    if (dist < 14) return;

    var angle = Math.atan2(dy, dx);
    var d;
    if (angle > -Math.PI / 4 && angle <= Math.PI / 4) {
      d = { x: 1, y: 0 };
    } else if (angle > Math.PI / 4 && angle <= 3 * Math.PI / 4) {
      d = { x: 0, y: 1 };
    } else if (angle > -3 * Math.PI / 4 && angle <= -Math.PI / 4) {
      d = { x: 0, y: -1 };
    } else {
      d = { x: -1, y: 0 };
    }
    setDir(d);
  }

  function joyStart(e) {
    e.preventDefault();
    joyOn = true;
    joyUpdate(e);
  }

  function joyMove(e) {
    if (!joyOn) return;
    e.preventDefault();
    joyUpdate(e);
  }

  function joyEnd(e) {
    e.preventDefault();
    joyOn = false;
    thumbEl.style.left = '50%';
    thumbEl.style.top  = '50%';
  }

  joyEl.addEventListener('touchstart', joyStart, { passive: false });
  joyEl.addEventListener('touchmove',  joyMove,  { passive: false });
  joyEl.addEventListener('touchend',   joyEnd);
  joyEl.addEventListener('touchcancel', joyEnd);

  // ---- keyboard ----
  document.addEventListener('keydown', function (e) {
    var keyMap = {
      'ArrowUp':    { x: 0, y: -1 },
      'ArrowDown':  { x: 0, y: 1 },
      'ArrowLeft':  { x: -1, y: 0 },
      'ArrowRight': { x: 1, y: 0 },
      'w': { x: 0, y: -1 },
      's': { x: 0, y: 1 },
      'a': { x: -1, y: 0 },
      'd': { x: 1, y: 0 }
    };
    var k = keyMap[e.key.toLowerCase()];
    if (k) {
      e.preventDefault();
      setDir(k);
    }
    if (e.key === ' ') {
      e.preventDefault();
      togglePause();
    }
    if (e.key === 'r' || e.key === 'R') {
      e.preventDefault();
      restart();
    }
  });

  // ---- prevent pull-to-refresh on canvas/joystick ----
  document.addEventListener('touchmove', function (e) {
    if (e.target === canvas || (e.target.closest && e.target.closest('.joy-base'))) {
      e.preventDefault();
    }
  }, { passive: false });

  // ---- main loop ----
  function gameTick() {
    update();
    draw();
  }

  function startLoop() {
    clearInterval(loopId);
    loopId = setInterval(gameTick, getSpeed());
  }

  restart();
});
</script>
</body>
</html>
