<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    padding: 10px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 4px;
  }
  .score { color: #e94560; font-size: 22px; font-weight: bold; }
  .timer { color: #c0a060; font-size: 18px; font-weight: bold; }
  .best  { color: #888; font-size: 16px; }
  .game-area {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
  }
  canvas {
    border: 2px solid #0f3460;
    border-radius: 4px;
    background: #16213e;
    width: 100%;
    height: 100%;
    display: block;
  }
  .overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .hidden { display: none; }

  .joystick-base {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
    border: 2px solid rgba(255,255,255,0.12);
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .joystick-thumb {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(233, 69, 96, 0.45);
    border: 2px solid rgba(233, 69, 96, 0.3);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .controls {
    color: #555;
    font-size: 13px;
    text-align: center;
  }
  .controls span { color: #e94560; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="score">分数: <span id="score">0</span></div>
    <div class="timer">⏱ <span id="timer">00:00</span></div>
    <div class="best">最高: <span id="best">0</span></div>
  </div>
  <div class="game-area">
    <canvas id="canvas"></canvas>
    <div id="overlay" class="overlay hidden"></div>
  </div>
  <div class="joystick-base" id="joystick">
    <div class="joystick-thumb" id="thumb"></div>
  </div>
  <div class="controls">
    键盘 <span>WASD/方向键</span> &nbsp;|&nbsp; 手机摇杆控制 &nbsp;|&nbsp; 点画面暂停
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const timerEl = document.getElementById('timer');
const overlay = document.getElementById('overlay');
const joystick = document.getElementById('joystick');
const thumb = document.getElementById('thumb');

const GRID = 20;
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;

let snake, food, dir, nextDir, score, best, gameLoop, running, paused;
let elapsed, timerInterval, startTime;

try {
  const saved = localStorage.getItem('snakeBest');
  best = saved ? parseInt(saved, 10) : 0;
  if (isNaN(best)) best = 0;
} catch(e) { best = 0; }
bestEl.textContent = best;

function init() {
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX, y: midY },
    { x: midX - 1, y: midY },
    { x: midX - 2, y: midY },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  scoreEl.textContent = score;
  running = true;
  paused = false;
  overlay.classList.add('hidden');
  elapsed = 0;
  startTime = Date.now();
  timerEl.textContent = '00:00';
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  spawnFood();
}

function updateTimer() {
  if (!running || paused) return;
  elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const free = [];
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      if (!occupied.has(`${x},${y}`)) free.push({ x, y });
  food = free[Math.floor(Math.random() * free.length)];
}

function update() {
  if (!running || paused) return;
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, ROWS * GRID); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(COLS * GRID, y * GRID); ctx.stroke(); }

  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  snake.forEach((s, i) => {
    const alpha = 1 - i / (snake.length + 10) * 0.6;
    ctx.fillStyle = i === 0 ? '#0f0' : `rgba(0, 200, 100, ${alpha})`;
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });

  // 右下角日期
  const now = new Date();
  const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '11px "Segoe UI"';
  ctx.textAlign = 'right';
  ctx.fillText(ds, canvas.width - 6, canvas.height - 6);

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
  }
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  clearInterval(timerInterval);
  if (score > best) {
    best = score;
    bestEl.textContent = best;
    try { localStorage.setItem('snakeBest', String(best)); } catch(e) {}
  }
  overlay.textContent = '游戏结束';
  overlay.classList.remove('hidden');
}

function restart() {
  init();
  startLoop();
}

function setDirection(d) {
  if (dir.x === -d.x && dir.y === -d.y) return;
  nextDir = d;
  if (!running) restart();
}

canvas.addEventListener('click', () => {
  if (!running) { restart(); return; }
  paused = !paused;
  if (paused) {
    clearInterval(timerInterval);
  } else {
    startTime = Date.now() - elapsed * 1000;
    timerInterval = setInterval(updateTimer, 1000);
  }
});

// 摇杆逻辑
const JOYSTICK_R = 55;
const DEAD = 14;
let joyActive = false;

function joyPos(e) {
  const touch = e.touches[0];
  const rect = joystick.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = touch.clientX - cx;
  let dy = touch.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = JOYSTICK_R - 22;
  if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
  thumb.style.left = `calc(50% + ${dx}px)`;
  thumb.style.top  = `calc(50% + ${dy}px)`;

  if (dist < DEAD) return;

  const angle = Math.atan2(dy, dx);
  let d;
  if      (angle > -Math.PI/4 && angle <= Math.PI/4)   d = { x: 1, y: 0 };
  else if (angle >  Math.PI/4 && angle <= 3*Math.PI/4) d = { x: 0, y: 1 };
  else if (angle > -3*Math.PI/4 && angle <= -Math.PI/4) d = { x: 0, y: -1 };
  else                                                   d = { x: -1, y: 0 };
  setDirection(d);
}

function joyStart(e) { e.preventDefault(); joyActive = true; joyPos(e); }
function joyMove(e)  { if (!joyActive) return; e.preventDefault(); joyPos(e); }
function joyEnd(e)   { e.preventDefault(); joyActive = false; thumb.style.left = '50%'; thumb.style.top = '50%'; }

joystick.addEventListener('touchstart', joyStart, { passive: false });
joystick.addEventListener('touchmove',  joyMove,  { passive: false });
joystick.addEventListener('touchend',   joyEnd);
joystick.addEventListener('touchcancel', joyEnd);

// 键盘
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
  };
  const k = map[e.key.toLowerCase()];
  if (k) { e.preventDefault(); setDirection(k); }
  if (e.key === ' ') {
    e.preventDefault();
    if (!running) { restart(); return; }
    paused = !paused;
    if (paused) {
      clearInterval(timerInterval);
    } else {
      startTime = Date.now() - elapsed * 1000;
      timerInterval = setInterval(updateTimer, 1000);
    }
  }
});

function startLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(() => { update(); draw(); }, 100);
}

init();
startLoop();
</script>
</body>
</html>
